kind = "web"
previewPath = "/"
title = "BannerForge"
version = "1.0.0"
id = "artifacts/bannerforge"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19590

[services.development]
run = "pnpm --filter @workspace/bannerforge run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/bannerforge", "run", "build" ]
publicDir = "artifacts/bannerforge/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19590"
BASE_PATH = "/"
